<!DOCTYPE html>
<html>
<head>
<title>アルバイトマップ</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

#map {
  height: 100%;
  width: 100%;
}

/* UI */
#ui-panel {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 340px;
  z-index: 1000;
  background: white;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  font-family: sans-serif;
}

#searchInput {
  width: 100%;
  padding: 8px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

#radiusContainer {
  margin-top: 14px;
  position: relative;
}

#radiusSlider {
  width: 100%;
}

#sliderTicks {
  position: absolute;
  top: 18px;
  left: 0;
  right: 0;
  height: 10px;
  pointer-events: none;
}

.sliderTick {
  position: absolute;
  width: 1px;
  height: 10px;
  background: #bbb;
}

#radiusLabel {
  margin-top: 8px;
  font-size: 13px;
  text-align: right;
}

#lockBtn {
  margin-top: 10px;
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: none;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

#lockBtn.active {
  background: #333;
}

/* クロスヘア */
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 999;
}

#crosshair::before,
#crosshair::after {
  content: "";
  position: absolute;
  background: #ff4da6;
}

#crosshair::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

#crosshair::after {
  top: 50%;
  left: 0;
  height: 2px;
  width: 100%;
  transform: translateY(-50%);
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui-panel">
  <input id="searchInput" placeholder="住所・駅・施設を検索">
  <div id="radiusContainer">
    <input type="range" id="radiusSlider" min="100" max="5000" step="100" value="1000">
    <div id="sliderTicks"></div>
    <div id="radiusLabel"></div>
  </div>
  <button id="lockBtn">円の位置を固定</button>
</div>

<div id="crosshair"></div>

<script>
let map;
let circle;
let markers = [];
let radius = 1000;
let locked = false;
let lockedCenter = null;

/* 仮求人データ（審査用） */
window.jobData = [
  {lat:35.681236,lng:139.767125},
  {lat:35.683500,lng:139.769000},
  {lat:35.679800,lng:139.765000}
];

/* 半径表示 */
function formatRadius(r){
  if(r < 1000) return r + " m";
  return (r/1000) + " km";
}

/* 目盛り */
function createTicks(){
  const slider = document.getElementById("radiusSlider");
  const ticks = document.getElementById("sliderTicks");
  ticks.innerHTML="";

  const values=[100,200,300,400,500,600,700,800,900,1000,2000,3000,4000,5000];

  const rect=slider.getBoundingClientRect();
  const width=rect.width;

  values.forEach(v=>{
    const percent=(v-slider.min)/(slider.max-slider.min);
    const tick=document.createElement("div");
    tick.className="sliderTick";
    tick.style.left=(percent*width)+"px";
    ticks.appendChild(tick);
  });
}

/* 初期化 */
function initMap(){

  map=new google.maps.Map(document.getElementById("map"),{
    center:{lat:35.681236,lng:139.767125},
    zoom:14,
    mapTypeControl:false,
    streetViewControl:false
  });

  map.addListener("idle",()=>{
    if(!locked){
      updateCircle(map.getCenter());
    }
  });

  const input=document.getElementById("searchInput");
  const autocomplete=new google.maps.places.Autocomplete(input);
  autocomplete.bindTo("bounds",map);

  autocomplete.addListener("place_changed",()=>{
    const place=autocomplete.getPlace();
    if(!place.geometry) return;
    map.panTo(place.geometry.location);
    map.setZoom(15);
    lockCircle(place.geometry.location);
  });

  input.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      const geocoder=new google.maps.Geocoder();
      geocoder.geocode({address:input.value},(results,status)=>{
        if(status==="OK"){
          map.panTo(results[0].geometry.location);
          map.setZoom(15);
          lockCircle(results[0].geometry.location);
        }
      });
    }
  });

  document.getElementById("radiusSlider").addEventListener("input",e=>{
    radius=parseInt(e.target.value);

    if(radius<=1000){
      e.target.step=100;
    }else{
      e.target.step=1000;
      radius=Math.round(radius/1000)*1000;
      e.target.value=radius;
    }

    document.getElementById("radiusLabel").innerText="半径 "+formatRadius(radius);

    const center=locked?lockedCenter:map.getCenter();
    updateCircle(center);
  });

  document.getElementById("lockBtn").addEventListener("click",()=>{
    if(locked){
      locked=false;
      lockedCenter=null;
      document.getElementById("lockBtn").classList.remove("active");
      document.getElementById("lockBtn").innerText="円の位置を固定";
    }else{
      lockCircle(map.getCenter());
    }
  });

  document.getElementById("radiusLabel").innerText="半径 "+formatRadius(radius);
  setTimeout(createTicks,300);
}

/* 円固定 */
function lockCircle(center){
  locked=true;
  lockedCenter=center;
  document.getElementById("lockBtn").classList.add("active");
  document.getElementById("lockBtn").innerText="固定中（クリックで解除）";
  updateCircle(center);
}

/* 円更新 */
function updateCircle(center){

  if(circle) circle.setMap(null);

  circle=new google.maps.Circle({
    map:map,
    center:center,
    radius:radius,
    strokeColor:"#ff4da6",
    strokeOpacity:0.8,
    strokeWeight:2,
    fillColor:"#ff4da6",
    fillOpacity:0.15
  });

  showNearby(center.lat(),center.lng());
}

/* マーカー */
function showNearby(lat,lng){

  markers.forEach(m=>m.setMap(null));
  markers=[];

  window.jobData.forEach(job=>{
    const d=getDistance(lat,lng,job.lat,job.lng);
    if(d<=radius){
      const marker=new google.maps.Marker({
        position:{lat:job.lat,lng:job.lng},
        map:map,
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          scale:8,
          fillColor:"#ff4da6",
          fillOpacity:1,
          strokeColor:"#fff",
          strokeWeight:2
        }
      });
      markers.push(marker);
    }
  });
}

/* 距離 */
function getDistance(lat1,lng1,lat2,lng2){
  const R=6371000;
  const toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeN86oLR4R-KCV85VY3fawtP4SVmPkF2Q&libraries=places&callback=initMap" async defer></script>

</body>
</html>
