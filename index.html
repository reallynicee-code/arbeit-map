<!DOCTYPE html>
<html>
<head>
  <title>アルバイトマップ</title>
  <style>
    body { margin:0; font-family:sans-serif; }

    #map {
  height: 100vh;
  width: 100%;
  position: relative;
}

#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 999;
}

#crosshair::before,
#crosshair::after {
  content: "";
  position: absolute;
  background: #ff4da6;
}

#crosshair::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

#crosshair::after {
  top: 50%;
  left: 0;
  height: 2px;
  width: 100%;
  transform: translateY(-50%);
}
  </style>
</head>

<body>

<input id="autocomplete" placeholder="住所・駅・施設を検索">

<div id="map"></div>
<div id="crosshair"></div>

<div id="radiusControl">
  <div>半径</div>
  <div id="radiusLabel">1.0 km</div>
　<div id="sliderTrack">
  　<div id="sliderThumb"></div>
</div>
</div>

<script>
let map;
let markers = [];
let circle;
let currentCenter = null;
let radius = 1000; // 初期半径（m）

function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.681236, lng: 139.767125 }, // 初期位置（東京駅）
    zoom: 14,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false
  });

  // 🔥 マップ操作終了時に自動検索
  map.addListener("idle", function () {
    updateFromCenter();
  });

  // 🔥 オートコンプリート（曖昧検索可）
  const input = document.getElementById("searchInput");
  const autocomplete = new google.maps.places.Autocomplete(input);
  autocomplete.bindTo("bounds", map);

  autocomplete.addListener("place_changed", function () {
    const place = autocomplete.getPlace();
    if (!place.geometry) return;

    map.panTo(place.geometry.location);
    map.setZoom(15);
  });

  // 🔥 Enterキーでも検索
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      e.preventDefault();
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: input.value }, function (results, status) {
        if (status === "OK") {
          map.panTo(results[0].geometry.location);
          map.setZoom(15);
        }
      });
    }
  });
}

/* ===========================
   中心基準で更新
=========================== */
function updateFromCenter() {
  const center = map.getCenter();
  currentCenter = center;

  drawCircle(center.lat(), center.lng());
  showNearby(center.lat(), center.lng());
}

/* ===========================
   円描画
=========================== */
function drawCircle(lat, lng) {

  if (circle) circle.setMap(null);

  circle = new google.maps.Circle({
    strokeColor: "#ff4da6",
    strokeOpacity: 0.8,
    strokeWeight: 2,
    fillColor: "#ff4da6",
    fillOpacity: 0.15,
    map: map,
    center: { lat: lat, lng: lng },
    radius: radius
  });
}

/* ===========================
   マーカー表示
=========================== */
function showNearby(lat, lng) {

  clearMarkers();

  // ここはあなたのバイトデータ配列に置き換えてください
  const jobs = window.jobData || [];

  jobs.forEach(job => {

    const distance = getDistance(
      lat,
      lng,
      job.lat,
      job.lng
    );

    if (distance <= radius) {

      const marker = new google.maps.Marker({
        position: { lat: job.lat, lng: job.lng },
        map: map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: "#ff4da6",
          fillOpacity: 1,
          strokeColor: "#ffffff",
          strokeWeight: 2
        }
      });

      markers.push(marker);
    }
  });
}

/* ===========================
   マーカー削除
=========================== */
function clearMarkers() {
  markers.forEach(marker => marker.setMap(null));
  markers = [];
}

/* ===========================
   距離計算（m）
=========================== */
function getDistance(lat1, lng1, lat2, lng2) {

  const R = 6371000;
  const toRad = deg => deg * Math.PI / 180;

  const dLat = toRad(lat2 - lat1);
  const dLng = toRad(lng2 - lng1);

  const a =
    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
    Math.cos(toRad(lat1)) *
    Math.cos(toRad(lat2)) *
    Math.sin(dLng / 2) *
    Math.sin(dLng / 2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

  return R * c;
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmqdJRIJFxxNcOFce0rSidVINyLGfk8_o&libraries=places&callback=initMap" async defer></script>

</body>
</html>
