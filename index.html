<!DOCTYPE html>
<html>
<head>
  <title>アルバイトマップ</title>
  <style>
    #map {
      height: 90vh;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>アルバイトマップ</h1>
  <div id="map"></div>

  <script>
    function initMap() {
      const tokyo = { lat: 35.681236, lng: 139.767125 };

      const map = new google.maps.Map(document.getElementById("map"), {
        zoom: 12,
        center: tokyo,
      });

      new google.maps.Marker({
        position: tokyo,
        map: map,
      });
    }
  </script>

  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmqdJRIJFxxNcOFce0rSidVINyLGfk8_o&callback=initMap">
  </script>
</body>
</html>
