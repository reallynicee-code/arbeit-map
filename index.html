<!DOCTYPE html>
<html>
<head>
  <title>アルバイトマップ</title>

  <style>
    /* ← ここにCSSを書く */

    #map {
      height: 100vh;
    }

    #radiusControl {
      position: absolute;
      right: 20px;
      top: 120px;
      width: 60px;
      height: 400px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      z-index: 999;
    }

    #radiusLabel {
      font-size: 14px;
      margin-bottom: 10px;
    }

    #sliderTrack {
      position: relative;
      width: 6px;
      height: 330px;
      background: #ddd;
      border-radius: 3px;
    }

    #sliderThumb {
      position: absolute;
      left: -7px;
      width: 20px;
      height: 20px;
      background: white;
      border: 2px solid #4285F4;
      border-radius: 50%;
      cursor: pointer;
    }

  </style>
</head>
<body>
<input
  id="autocomplete"
  type="text"
  placeholder="住所・駅・施設を検索"
  style="width:300px; padding:8px; margin:10px;"
/>
  <h1>アルバイトマップ</h1>
  <div id="map"></div>
  <div id="radiusControl">
  <div id="radiusLabel">1.0 km</div>
  <div id="sliderTrack">
    <div id="sliderThumb"></div>
  </div>
</div>

<script>
  let map;
  let autocomplete;
  let geocoder;
  let radiusKm = 1; // ← デフォルト1km
　let circle = null;
　let currentCenter = null;
// ---- 既存マーカー処理 ----
  const jobs = [
      {
        lat: 35.681236,
        lng: 139.767125,
        title: "東京駅カフェスタッフ",
        description: "駅ナカのカフェで接客",
        wage: "時給1200円"
      },
      {
        lat: 35.6895,
        lng: 139.6917,
        title: "新宿コンビニ店員",
        description: "夜勤スタッフ募集",
        wage: "時給1300円"
      },
      {
        lat: 35.658034,
        lng: 139.701636,
        title: "渋谷居酒屋ホール",
        description: "学生歓迎",
        wage: "時給1250円"
      }
    ];
  
function getDistance(lat1, lng1, lat2, lng2) {
  const R = 6371; // 地球半径(km)
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
  let circle;

function drawCircle(lat, lng) {
  if (circle) circle.setMap(null);

  circle = new google.maps.Circle({
    strokeColor: "#4285F4",
    strokeOpacity: 0.8,
    strokeWeight: 2,
    fillColor: "#4285F4",
    fillOpacity: 0.2,
    map,
    center: { lat, lng },
    radius: RADIUS_KM * 1000
  });
}
let markers = [];

function showNearbyJobs(centerLat, centerLng) {
  markers.forEach(marker => marker.setMap(null));
  markers = [];

  jobs.forEach(job => {
    const distance = getDistance(centerLat, centerLng, job.lat, job.lng);

    if (distance <= RADIUS_KM) {
      const marker = new google.maps.Marker({
        position: { lat: job.lat, lng: job.lng },
        map: map,
        title: job.title
      });

      markers.push(marker);
    }
  });
}
  function initMap() {
    const tokyo = { lat: 35.681236, lng: 139.767125 };

    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 12,
      center: tokyo,
    });

    geocoder = new google.maps.Geocoder();

    const input = document.getElementById("autocomplete");
    autocomplete = new google.maps.places.Autocomplete(input);
    autocomplete.bindTo("bounds", map);

    // 候補を選んだ場合
    autocomplete.addListener("place_changed", () => {
      const place = autocomplete.getPlace();
      if (place.geometry) {
        moveToLocation(place.geometry.location);
      }
    });

    // Enter押した場合
    input.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        searchByGeocoder(input.value);
      }
    });

    const infoWindow = new google.maps.InfoWindow();

    jobs.forEach(job => {
      const marker = new google.maps.Marker({
        position: { lat: job.lat, lng: job.lng },
        map: map,
        title: job.title,
        icon: {
          url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
        }
      });

      marker.addListener("click", () => {
        infoWindow.setContent(`
          <div>
            <h3>${job.title}</h3>
            <p>${job.description}</p>
            <strong>${job.wage}</strong>
          </div>
        `);
        infoWindow.open(map, marker);
      });
    });
    function initMap() {
  const tokyo = { lat: 35.681236, lng: 139.767125 };

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 12,
    center: tokyo,
  });

  geocoder = new google.maps.Geocoder();

  const input = document.getElementById("autocomplete");
  autocomplete = new google.maps.places.Autocomplete(input);
  autocomplete.bindTo("bounds", map);

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (place.geometry) {
      moveToLocation(place.geometry.location);
    }
  });

  input.addEventListener("keydown", function (event) {
    if (event.key === "Enter") {
      event.preventDefault();
      searchByGeocoder(input.value);
    }
  });

  // 👇 ここに追加
  initRadiusSlider();
  }

function moveToLocation(location) {
  map.panTo(location);
  map.setZoom(13);

  const centerLat = location.lat();
  const centerLng = location.lng();

  showNearbyJobs(centerLat, centerLng);
  drawCircle(centerLat, centerLng);
}

  function searchByGeocoder(address) {
    geocoder.geocode({ address: address }, (results, status) => {
      if (status === "OK") {
        moveToLocation(results[0].geometry.location);
      } else {
        alert("場所が見つかりませんでした: " + status);
      }
    });
  }
  function initRadiusSlider() {
  const track = document.getElementById("sliderTrack");
  const thumb = document.getElementById("sliderThumb");
  const label = document.getElementById("radiusLabel");

  const trackHeight = 330;
  const maxKm = 5;

  function updateRadiusFromPosition(y) {
    const percent = 1 - (y / trackHeight);
    let rawKm = percent * maxKm;

    if (rawKm <= 1) {
      rawKm = Math.round(rawKm * 10) / 10;
    } else {
      rawKm = Math.round(rawKm);
    }

    if (rawKm < 0) rawKm = 0;
    if (rawKm > 5) rawKm = 5;

    radiusKm = rawKm;
    label.textContent = radiusKm.toFixed(1) + " km";

    thumb.style.top = (trackHeight - (radiusKm / maxKm) * trackHeight - 10) + "px";

    if (currentCenter) {
      showNearbyJobs(currentCenter.lat(), currentCenter.lng());
      drawCircle(currentCenter.lat(), currentCenter.lng());
    }
  }

  thumb.addEventListener("mousedown", function(e) {
    function move(e2) {
      const rect = track.getBoundingClientRect();
      let y = e2.clientY - rect.top;
      if (y < 0) y = 0;
      if (y > trackHeight) y = trackHeight;
      updateRadiusFromPosition(y);
    }

    document.addEventListener("mousemove", move);
    document.addEventListener("mouseup", function() {
      document.removeEventListener("mousemove", move);
    }, { once: true });
  });

  // 初期位置
  updateRadiusFromPosition(trackHeight * (1 - radiusKm / maxKm));
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmqdJRIJFxxNcOFce0rSidVINyLGfk8_o&libraries=places&callback=initMap"
  async
  defer
></script>
</body>
</html>
