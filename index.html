<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>アルバイトマップ</title>

<style>
html,body{
  height:100%;
  margin:0;
}

#map{
  height:100%;
}

#ui{
  position:absolute;
  top:20px;
  left:20px;
  width:340px;
  background:white;
  padding:14px;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
  z-index:1000;
  font-family:sans-serif;
}

#search{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

#slider{
  width:100%;
  margin-top:12px;
}

#radiusLabel{
  margin-top:6px;
  font-size:13px;
  text-align:right;
}

#lockBtn{
  width:100%;
  margin-top:10px;
  padding:6px;
  border:none;
  border-radius:6px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
}

#lockBtn.active{
  background:#333;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui">
  <input id="search" placeholder="住所・駅・施設を検索">
  <input type="range" id="slider" min="100" max="5000" step="100" value="1000">
  <div id="radiusLabel"></div>
  <button id="lockBtn">円の位置を固定</button>
</div>

<script>
let map;
let circle;
let radius = 1000;
let locked = false;
let lockedCenter = null;
let centerMarker = null;
let markers = [];
let activeInfo = null;

const jobs = [
  {lat:35.681236,lng:139.767125,title:"東京駅カフェスタッフ",days:"週2日〜OK",wage:"時給1200円",image:"https://picsum.photos/300/120?1"},
  {lat:35.6895,lng:139.6917,title:"新宿コンビニ店員",days:"週3日〜OK",wage:"時給1300円",image:"https://picsum.photos/300/120?2"},
  {lat:35.658034,lng:139.701636,title:"渋谷居酒屋ホール",days:"週1日〜OK",wage:"時給1250円",image:"https://picsum.photos/300/120?3"},
  {lat:35.6794,lng:139.7648,title:"KITTE丸の内販売スタッフ",days:"週2日〜OK",wage:"時給1250円",image:"https://picsum.photos/300/120?4"},
  {lat:35.6764,lng:139.7632,title:"東京国際フォーラム受付",days:"週3日〜OK",wage:"時給1350円",image:"https://picsum.photos/300/120?5"}
];

function initMap(){

  map = new google.maps.Map(document.getElementById("map"),{
    center:{lat:35.681236,lng:139.767125},
    zoom:14,
    mapId:"ed7852573fd62be93ad25879"
  });

  map.addListener("idle",()=>{
    if(!locked){
      updateCircle(map.getCenter());
    }
  });

  document.getElementById("slider").addEventListener("input",e=>{
    let v = parseInt(e.target.value);

    if(v < 1000){
      e.target.step = 100;
    }else{
      e.target.step = 1000;
      v = Math.round(v/1000)*1000;
      e.target.value = v;
    }

    radius = v;
    updateLabel();
    updateCircle(locked ? lockedCenter : map.getCenter());
  });

  document.getElementById("lockBtn").addEventListener("click",()=>{
    if(locked){
      locked=false;
      if(centerMarker) centerMarker.map=null;
      document.getElementById("lockBtn").classList.remove("active");
      document.getElementById("lockBtn").innerText="円の位置を固定";
    }else{
      locked=true;
      lockedCenter=map.getCenter();
      createCenterMarker(lockedCenter);
      document.getElementById("lockBtn").classList.add("active");
      document.getElementById("lockBtn").innerText="固定中（クリックで解除）";
      updateCircle(lockedCenter);
    }
  });

  updateLabel();
}

function updateLabel(){
  const label=document.getElementById("radiusLabel");
  label.innerText = radius<1000 ? "半径 "+radius+" m" : "半径 "+(radius/1000)+" km";
}

function createCenterMarker(position){
  if(centerMarker) centerMarker.map=null;

  const div=document.createElement("div");
  div.style.fontSize="28px";
  div.style.fontWeight="bold";
  div.style.color="black";
  div.innerHTML="✕";

  centerMarker=new google.maps.marker.AdvancedMarkerElement({
    map:map,
    position:position,
    content:div
  });
}

function updateCircle(center){
  if(circle) circle.setMap(null);

  circle=new google.maps.Circle({
    map:map,
    center:center,
    radius:radius,
    strokeColor:"#ff4da6",
    strokeWeight:2,
    fillColor:"#ff4da6",
    fillOpacity:0.15
  });

  showJobs(center.lat(),center.lng());
}

function showJobs(lat,lng){
  markers.forEach(m=>m.map=null);
  markers=[];

  jobs.forEach(job=>{
    if(distance(lat,lng,job.lat,job.lng)<=radius){
      createJobMarker(job);
    }
  });
}

function createJobMarker(job){

  const pin=new google.maps.marker.PinElement({
    background:"#1e90ff",
    borderColor:"#1e90ff",
    glyphText:"求",
    glyphColor:"white"
  });

  const marker=new google.maps.marker.AdvancedMarkerElement({
    map:map,
    position:{lat:job.lat,lng:job.lng},
    content:pin
  });

  const info=new google.maps.InfoWindow({
    content:`
      <div style="width:240px">
        <img src="${job.image}" style="width:100%;border-radius:8px;">
        <h3 style="margin:8px 0 4px 0;">${job.title}</h3>
        <div>${job.days}</div>
        <div>${job.wage}</div>
      </div>
    `
  });

  marker.addEventListener("gmp-click",()=>{
    if(activeInfo) activeInfo.close();
    info.open(map,marker);
    activeInfo=info;
  });

  markers.push(marker);
}

function distance(lat1,lng1,lat2,lng2){
  const R=6371000;
  const toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeN86oLR4R-KCV85VY3fawtP4SVmPkF2Q&libraries=marker&callback=initMap" async defer></script>

</body>
</html>
