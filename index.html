<!DOCTYPE html>
<html>
<head>
<title>アルバイトマップ</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

#map {
  height: 100%;
  width: 100%;
}

/* UIパネル */
#ui-panel {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 340px;
  z-index: 1000;
  background: white;
  padding: 14px;
  border-radius: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  font-family: sans-serif;
}

#searchInput {
  width: 100%;
  padding: 8px;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

/* スライダー */
#radiusContainer {
  margin-top: 14px;
  position: relative;
}

#radiusSlider {
  width: 100%;
  position: relative;
  z-index: 2; /* スライダーを上に */
}

#sliderTicks {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  height: 14px;
  transform: translateY(-50%);
  z-index: 1; /* スライダーの下 */
  pointer-events: none;
}

.sliderTick {
  position: absolute;
  width: 2px;
  height: 14px;
  background: #bbb;
}

#radiusLabel {
  margin-top: 8px;
  font-size: 13px;
  text-align: right;
}

#lockBtn {
  margin-top: 10px;
  width: 100%;
  padding: 6px;
  border-radius: 6px;
  border: none;
  background: #ff4da6;
  color: white;
  cursor: pointer;
}

#lockBtn.active {
  background: #333;
}

/* クロスヘア */
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 30px;
  height: 30px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 999;
}

#crosshair::before,
#crosshair::after {
  content: "";
  position: absolute;
  background: #ff4da6;
}

#crosshair::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

#crosshair::after {
  top: 50%;
  left: 0;
  height: 2px;
  width: 100%;
  transform: translateY(-50%);
}
</style>
</head>

<body>

<div id="map"></div>

<div id="ui-panel">
  <input id="searchInput" placeholder="住所・駅・施設を検索">

  <div id="radiusContainer">
    <div id="sliderTicks"></div>
    <input type="range" id="radiusSlider" min="100" max="5000" step="100" value="1000">
    <div id="radiusLabel"></div>
  </div>

  <button id="lockBtn">円の位置を固定</button>
</div>

<div id="crosshair"></div>

<script>
let map;
let circle;
let markers = [];
let radius = 1000;
let locked = false;
let lockedCenter = null;
let centerMarker = null;
let infoWindow;

/* 求人データ */
const jobs = [
  {
    lat: 35.681236,
    lng: 139.767125,
    title: "東京駅カフェスタッフ",
    days: "週2日〜OK",
    wage: "時給1200円"
  },
  {
    lat: 35.6895,
    lng: 139.6917,
    title: "新宿コンビニ店員",
    days: "週3日〜OK",
    wage: "時給1300円"
  },
  {
    lat: 35.658034,
    lng: 139.701636,
    title: "渋谷居酒屋ホール",
    days: "週1日〜OK",
    wage: "時給1250円"
  }
];

function formatRadius(r){
  return r < 1000 ? r+" m" : (r/1000)+" km";
}

/* 目盛り完全補正 */
function createTicks(){
  const slider = document.getElementById("radiusSlider");
  const ticks = document.getElementById("sliderTicks");
  ticks.innerHTML="";

  const min = parseInt(slider.min);
  const max = parseInt(slider.max);
  const values=[100,500,1000,2000,3000,4000,5000];

  const width = slider.offsetWidth;

  values.forEach(v=>{
    const percent=(v-min)/(max-min);
    const tick=document.createElement("div");
    tick.className="sliderTick";
    tick.style.left=(percent*width - 1)+"px";
    ticks.appendChild(tick);
  });
}

function initMap(){

  map=new google.maps.Map(document.getElementById("map"),{
    center:{lat:35.681236,lng:139.767125},
    zoom:14
  });

  infoWindow = new google.maps.InfoWindow();

  map.addListener("idle",()=>{
    if(!locked){
      updateCircle(map.getCenter());
    }
  });

  document.getElementById("radiusSlider").addEventListener("input",e=>{
    radius=parseInt(e.target.value);
    document.getElementById("radiusLabel").innerText="半径 "+formatRadius(radius);
    const center=locked?lockedCenter:map.getCenter();
    updateCircle(center);
  });

  document.getElementById("lockBtn").addEventListener("click",()=>{
    if(locked){
      locked=false;
      lockedCenter=null;
      if(centerMarker) centerMarker.setMap(null);
      document.getElementById("lockBtn").classList.remove("active");
      document.getElementById("lockBtn").innerText="円の位置を固定";
    }else{
      lockCircle(map.getCenter());
    }
  });

  document.getElementById("radiusLabel").innerText="半径 "+formatRadius(radius);
  setTimeout(createTicks,300);
  window.addEventListener("resize",createTicks);
}

function lockCircle(center){
  locked=true;
  lockedCenter=center;

  if(centerMarker) centerMarker.setMap(null);

  centerMarker=new google.maps.Marker({
    position:center,
    map:map,
    icon:{
      path:google.maps.SymbolPath.CIRCLE,
      scale:10,
      fillColor:"#ff4da6",
      fillOpacity:1,
      strokeColor:"#fff",
      strokeWeight:3
    }
  });

  document.getElementById("lockBtn").classList.add("active");
  document.getElementById("lockBtn").innerText="固定中（クリックで解除）";
  updateCircle(center);
}

function updateCircle(center){

  if(circle) circle.setMap(null);

  circle=new google.maps.Circle({
    map:map,
    center:center,
    radius:radius,
    strokeColor:"#ff4da6",
    strokeWeight:2,
    fillColor:"#ff4da6",
    fillOpacity:0.15
  });

  showNearby(center.lat(),center.lng());
}

function showNearby(lat,lng){

  markers.forEach(m=>m.setMap(null));
  markers=[];

  jobs.forEach(job=>{
    const d=getDistance(lat,lng,job.lat,job.lng);
    if(d<=radius){

      const marker=new google.maps.Marker({
        position:{lat:job.lat,lng:job.lng},
        map:map,
        icon:{
          path:google.maps.SymbolPath.CIRCLE,
          scale:8,
          fillColor:"#1e90ff",
          fillOpacity:1,
          strokeColor:"#fff",
          strokeWeight:2
        }
      });

      marker.addListener("mouseover",()=>{
        infoWindow.setContent(
          "<b>"+job.title+"</b><br>"+
          job.days+"<br>"+
          job.wage
        );
        infoWindow.open(map,marker);
      });

      marker.addListener("mouseout",()=>{
        infoWindow.close();
      });

      markers.push(marker);
    }
  });
}

function getDistance(lat1,lng1,lat2,lng2){
  const R=6371000;
  const toRad=d=>d*Math.PI/180;
  const dLat=toRad(lat2-lat1);
  const dLng=toRad(lng2-lng1);
  const a=Math.sin(dLat/2)**2+
    Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*
    Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeN86oLR4R-KCV85VY3fawtP4SVmPkF2Q&callback=initMap" async defer></script>

</body>
</html>
