<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Arbeits Map</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
}

#map {
  height: 100%;
  width: 100%;
  position: relative;
}

/* クロスヘア（画面中央固定） */
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 24px;
  height: 24px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 1000;
}

#crosshair::before,
#crosshair::after {
  content: "";
  position: absolute;
  background: red;
}

#crosshair::before {
  left: 50%;
  top: 0;
  width: 2px;
  height: 100%;
  transform: translateX(-50%);
}

#crosshair::after {
  top: 50%;
  left: 0;
  height: 2px;
  width: 100%;
  transform: translateY(-50%);
}

/* コントロール */
.control-box {
  position: absolute;
  top: 20px;
  left: 20px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  z-index: 1001;
  width: 220px;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="crosshair"></div>

<div class="control-box">
  半径 <span id="radiusValue">1</span> km<br><br>
  <input type="range" id="radiusSlider" min="1" max="5" step="1" value="1" style="width:100%">
  <br><br>
  <button onclick="toggleFix()">固定（クリックで解除）</button>
</div>

<script>
let map;
let circle;
let centerMarker;
let fixed = false;
let activeInfoWindow = null;

function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 35.6895, lng: 139.6917 },
    zoom: 13,
    mapId: "ed7852573fd62be93ad25879"
  });

  updateCircle();

  map.addListener("center_changed", () => {
    if (!fixed) updateCircle();
  });

  document.getElementById("radiusSlider")
    .addEventListener("input", function () {
      document.getElementById("radiusValue").textContent = this.value;
      updateCircle();
    });

  addJobs();
}

function updateCircle() {
  const center = map.getCenter();
  const radius = document.getElementById("radiusSlider").value * 1000;

  if (circle) circle.setMap(null);

  circle = new google.maps.Circle({
    strokeColor: "#ff69b4",
    strokeOpacity: 1,
    strokeWeight: 2,
    fillColor: "#ff69b4",
    fillOpacity: 0.2,
    map: map,
    center: center,
    radius: radius
  });

  if (fixed) {
    setCenterMarker(center);
  }
}

function setCenterMarker(position) {
  if (centerMarker) centerMarker.setMap(null);

  centerMarker = new google.maps.Marker({
    position: position,
    map: map,
    label: {
      text: "✕",
      color: "black",
      fontSize: "20px",
      fontWeight: "bold"
    },
    clickable: false
  });
}

function toggleFix() {
  fixed = !fixed;

  if (fixed) {
    setCenterMarker(map.getCenter());
  } else {
    if (centerMarker) {
      centerMarker.setMap(null);
      centerMarker = null;
    }
  }
}

function addJobs() {

  const jobs = [
    {lat:35.6895,lng:139.6917,title:"カフェスタッフ",company:"Tokyo Cafe",wage:1200},
    {lat:35.695,lng:139.7,title:"コンビニ店員",company:"MiniStop",wage:1150},
    {lat:35.685,lng:139.68,title:"イベントスタッフ",company:"Event Co.",wage:1300}
  ];

  jobs.forEach(job => {

    const marker = new google.maps.Marker({
      position: {lat:job.lat,lng:job.lng},
      map: map
    });

    const infoWindow = new google.maps.InfoWindow({
      content: `
        <strong>${job.title}</strong><br>
        ${job.company}<br>
        時給: ${job.wage}円
      `
    });

    // ホバー表示
    marker.addListener("mouseover", () => {
      if (activeInfoWindow !== infoWindow) {
        infoWindow.open(map, marker);
      }
    });

    marker.addListener("mouseout", () => {
      if (activeInfoWindow !== infoWindow) {
        infoWindow.close();
      }
    });

    // クリック固定（常に1つだけ）
    marker.addListener("click", () => {

      if (activeInfoWindow && activeInfoWindow !== infoWindow) {
        activeInfoWindow.close();
      }

      activeInfoWindow = infoWindow;
      infoWindow.open(map, marker);
    });

  });
}
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAeN86oLR4R-KCV85VY3fawtP4SVmPkF2Q&callback=initMap"
  async defer>
</script>

</body>
</html>
